[backend]
# Backend mode: auto, wayland_keyd, x11
mode = auto

[keyd]
# Relative paths (when used) resolve from plugin directory.
generated_path = keyd/runtime/keyd.generated.conf
state_path = keyd/runtime/export_state.json
socket_path = /dev/shm/edmchotkeys/keyd.sock
token_file = /dev/shm/edmchotkeys/sender.token
apply_target_path = /etc/keyd/edmchotkeys.conf
command_template = /usr/bin/python3 /usr/local/bin/edmchotkeys_send.py --socket {socket_path} --binding-id {binding_id}
