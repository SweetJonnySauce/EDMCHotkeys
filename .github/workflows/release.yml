name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Pre-release version (vX.Y.Z-<prerelease>, e.g. v0.5.0-beta-1)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            version="${GITHUB_REF_NAME}"
            meta="$(python3 scripts/resolve_release_version.py --version "${version}")"
          else
            version="${{ github.event.inputs.version }}"
            meta="$(python3 scripts/resolve_release_version.py --version "${version}" --require-prerelease)"
          fi
          while IFS= read -r line; do
            echo "${line}" >> "$GITHUB_OUTPUT"
          done <<< "${meta}"

  quality-gate:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run release gate checks
        run: make check

  build-artifacts:
    runs-on: ubuntu-latest
    needs: [prepare, quality-gate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: linux-x11
            artifact_suffix: linux-x11
            artifact_ext: tar.gz
          - variant: linux-wayland
            artifact_suffix: linux-wayland
            artifact_ext: tar.gz
          - variant: windows
            artifact_suffix: windows
            artifact_ext: zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release artifact
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          python -m pip install --upgrade pip
          python scripts/build_release_artifact.py \
            --variant "${{ matrix.variant }}" \
            --version "${VERSION}" \
            --output-dir dist

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.variant }}
          path: dist/EDMCHotkeys-${{ matrix.artifact_suffix }}-${{ needs.prepare.outputs.version }}.${{ matrix.artifact_ext }}
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: [prepare, build-artifacts]
    steps:
      - uses: actions/checkout@v4

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Verify artifact set and generate checksums
        shell: bash
        run: |
          set -euo pipefail
          ls -lah dist
          count="$(find dist -maxdepth 1 -type f -name '*.tar.gz' -o -type f -name '*.zip' | wc -l | tr -d ' ')"
          if [[ "${count}" != "3" ]]; then
            echo "Expected 3 artifacts (2 Linux + 1 Windows), found ${count}" >&2
            exit 1
          fi
          sha256sum dist/*.tar.gz dist/*.zip > dist/SHA256SUMS.txt
          cat dist/SHA256SUMS.txt

      - name: Build release notes payload
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          python scripts/extract_release_notes.py \
            --input RELEASE_NOTES.md \
            --version "${VERSION}" \
            --output dist/RELEASE_NOTES.release.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists; uploading assets and updating notes."
            gh release upload "${VERSION}" dist/*.tar.gz dist/*.zip dist/SHA256SUMS.txt --clobber
            edit_flags=(--title "${VERSION}" --notes-file dist/RELEASE_NOTES.release.md)
            if [[ "${PRERELEASE}" == "true" ]]; then
              edit_flags+=(--prerelease)
            fi
            gh release edit "${VERSION}" "${edit_flags[@]}"
          else
            flags=(--target "${GITHUB_SHA}" --title "${VERSION}" --notes-file dist/RELEASE_NOTES.release.md)
            if [[ "${PRERELEASE}" == "true" ]]; then
              flags+=(--prerelease)
            fi
            if ! gh release create "${VERSION}" "${flags[@]}" dist/*.tar.gz dist/*.zip dist/SHA256SUMS.txt; then
              echo "Release create failed; retrying as upload/edit in case of race."
              gh release upload "${VERSION}" dist/*.tar.gz dist/*.zip dist/SHA256SUMS.txt --clobber
              edit_flags=(--title "${VERSION}" --notes-file dist/RELEASE_NOTES.release.md)
              if [[ "${PRERELEASE}" == "true" ]]; then
                edit_flags+=(--prerelease)
              fi
              gh release edit "${VERSION}" "${edit_flags[@]}"
            fi
          fi
